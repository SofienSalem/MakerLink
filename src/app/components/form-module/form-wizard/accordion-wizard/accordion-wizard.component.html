<mat-stepper orientation="vertical">
    <mat-step>
      <ng-template matStepLabel>Name & Email</ng-template>
      <ng-template matStepContent>
        <section>
                <div class="form-group">
                    <label class="form-control-label" for="firstname">Name: </label>
                    <input class="form-control" id="firstname" name="firstname" required type="text">
                </div>
                <div class="form-group">
                    <label class="form-control-label" for="lastname">Email:</label>
                    <input class="form-control" id="lastname" name="email" required type="email">
                </div>
        </section>
        <button class="btn btn-primary mt-2"  matStepperNext>Next</button>
      </ng-template>
    </mat-step>
    <mat-step>
      <ng-template matStepLabel>Contact</ng-template>
      <ng-template matStepContent>
        <section>
            <div class="form-group">
                <label class="form-control-label" for="email">Telephone:</label>
                <input class="form-control" name="number" type="number" required>
            </div>
            <div class="form-group">
                <label class="form-control-label" for="email">Mobile:</label>
                <input class="form-control" name="number" type="number" required>
            </div>
        </section>
        <button class="btn btn-danger me-2"  matStepperPrevious>Back</button>
        <button class="btn btn-primary me-2"  matStepperNext>Next</button>
      </ng-template>
    </mat-step>
    <mat-step>
      <ng-template matStepLabel>Payment</ng-template>
      <section>
        <div class="form-group">
            <label class="form-label" for="name11">Credit card</label>
            <input type="text" class="form-control" id="name11">
        </div>
        <div class="row">
            <div class="col-sm-4">
                <div class="form-group">
                    <label class="form-label" for="expdate3">Expiry</label>
                    <div class="input-group">
                        <input type="number" class="form-control" id="expdate3" name="expiremonth">
                    </div>
                </div>
            </div>
            <div class="col-sm-4 ">
                <div class="form-group mb-0 mt-2">
                    <label class="form-label" for="cvv2">CVV: <i class="fa fa-question-circle"></i></label>
                    <input type="number" class="form-control" id="cvv2" required>
                </div>
            </div>
        </div>
    </section>
      <button class="btn btn-danger mt-2"  matStepperPrevious>Back</button>
    </mat-step>
  </mat-stepper>
