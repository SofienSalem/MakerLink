


<app-page-header title="Apps" active_item="Shipping"></app-page-header>







<div class="row">
  <div class="col-12">
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Delivery</h3>
        <div class="input-group">
          <input type="text" class="form-control" placeholder="Filter deliveries" [(ngModel)]="filterValue" (ngModelChange)="applyFilter()">
        </div>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table mat-table [dataSource]="dataSource" class="table card-table border table-vcenter text-nowrap align-items-center">
            <ng-container matColumnDef="idDelivery">
              <th mat-header-cell *matHeaderCellDef> Id </th>
              <td mat-cell *matCellDef="let delivery"> {{ delivery.idDelivery }} </td>
            </ng-container>
      
            <ng-container matColumnDef="idPiece">
              <th mat-header-cell *matHeaderCellDef> Id Piece </th>
              <td mat-cell *matCellDef="let delivery"> {{ delivery.piece?.idPiece }} </td>
            </ng-container>
      
            <ng-container matColumnDef="region">
              <th mat-header-cell *matHeaderCellDef> Region </th>
              <td mat-cell *matCellDef="let delivery"> {{ delivery.region }} </td>
            </ng-container>
      
            <ng-container matColumnDef="homeDelivery">
              <th mat-header-cell *matHeaderCellDef> Home Delivery </th>
              <td mat-cell *matCellDef="let delivery"> {{ delivery.homeDelivery }} </td>
            </ng-container>
      
            <ng-container matColumnDef="homeAbroadDelivery">
              <th mat-header-cell *matHeaderCellDef> Home Abroad Delivery </th>
              <td mat-cell *matCellDef="let delivery"> {{ delivery.homeAbroadDelivery }} </td>
            </ng-container>
      
            <ng-container matColumnDef="userEmail">
              <th mat-header-cell *matHeaderCellDef> User Email </th>
              <td mat-cell *matCellDef="let delivery"> {{ delivery.piece?.user?.email }} </td>
            </ng-container>
      
            <ng-container matColumnDef="actions">
              <th mat-header-cell *matHeaderCellDef> Actions </th>
              <td mat-cell *matCellDef="let delivery">
                <button class="btn text-primary btn-sm" type="button" (click)="updateShapingStatus(delivery.idDelivery)" ngbTooltip="Shipping">
                  <li class="icons-list-item"><i class="ti-truck" ngbTooltip="ti-truck"></i></li>
                </button>
                <button class="btn text-secondary btn-sm" type="button" (click)="archiveShipping(delivery.idDelivery)" ngbTooltip="Archive Shipping">
                  <li class="icons-list-item"><i class="ti-archive"></i></li>
                </button>
              </td>
            </ng-container>
      
            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          </table>
          <mat-paginator [pageSizeOptions]="[5, 10, 25, 100]" aria-label="Select page of deliveries"></mat-paginator>
        </div>
      </div>
    </div>
  </div>
</div>
