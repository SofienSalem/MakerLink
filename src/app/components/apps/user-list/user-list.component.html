<app-page-header title="Apps"  active_item="User List"></app-page-header>
<!-- ROW OPEN -->
<div class="row">
    <div class="col-xl-12">
        <div class="input-group mb-5">
            <input type="text" class="form-control" placeholder="">
            <button type="button" class="btn btn-primary">
                <i class="fa fa-search" aria-hidden="true"></i>
            </button>
        </div>
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">1 - 30 of 546 users</h2>
                <div class="page-options d-flex float-end">
                    <select class="form-control select2 w-auto">
                        <option value="asc">Latest</option>
                        <option value="desc">Oldest</option>
                    </select>
                </div>
            </div>
            <div class="card-body">
                <div class="table-responsive table-lg">
                    <table class="table table-bordered mb-0">
                        <thead>
                            <tr>
                                <th  class="text-center">

                                </th>
                                <th class="text-center">User</th>
                                <th>User Name</th>
                                <th>Date of Joining</th>
                                <th>Performance</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr *ngFor="let i of user">
                                <td class="align-middle text-center">
                                    <div class="custom-control custom-control-inline custom-checkbox custom-control-nameless m-0 align-top">
                                        <input class="custom-control-input" id="item-{{i.id}}" type="checkbox"> <label class="custom-control-label" for="item-{{i.id}}"></label>
                                    </div>
                                </td>
                                <td class="align-middle text-center"><img alt="image" class="avatar avatar-md rounded-circle" src={{i.photo}}></td>
                                <td class="text-nowrap align-middle">{{i.name}}</td>
                                <td class="text-nowrap align-middle"><span>{{i.date}}</span></td>
                                <td class="text-nowrap align-middle">
                                    <div class="progress progress-xs">
                                        <div class="progress-bar bg-{{i.progresscolor}} w-{{i.number}}"></div>
                                    </div>
                                </td>
                                <td class="text-center align-middle">
                                    <div class="btn-group align-top">
                                        <button class="btn btn-sm btn-primary-light" type="button">Edit</button>
                                        <button class="btn btn-sm btn-primary-light" type="button"(click)="click(i.id)"><i class="fa fa-trash"></i></button>
                                    </div>
                                </td>
                            </tr>

                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        <div class="">
            <ul class="pagination float-end mb-5">
                <li class="page-item page-prev disabled">
                    <a class="page-link" href="javascript:void(0)" tabindex="-1">Prev</a>
                </li>
                <li class="page-item active"><a class="page-link" href="javascript:void(0)">1</a></li>
                <li class="page-item"><a class="page-link" href="javascript:void(0)">2</a></li>
                <li class="page-item"><a class="page-link" href="javascript:void(0)">3</a></li>
                <li class="page-item"><a class="page-link" href="javascript:void(0)">4</a></li>
                <li class="page-item"><a class="page-link" href="javascript:void(0)">5</a></li>
                <li class="page-item page-next">
                    <a class="page-link" href="javascript:void(0)">Next</a>
                </li>
            </ul>
        </div>
    </div><!-- COL-END -->
</div>
<!-- ROW CLOSED -->
