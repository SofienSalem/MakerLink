<app-page-header title="Apps"  active_item="Contact Us"></app-page-header>





<div class="row">
  <div class="col-12">
    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Full color variations</h3>
        <div class="mb-3 w-100">
          <div class="input-group">
            <input type="text" class="form-control" placeholder="Search Files" [(ngModel)]="searchEmail" (input)="filterContacts()">
            <a class="btn btn-primary" href="javascript:void(0)"><i class="fe fe-search"></i></a>
          </div>
          
        </div>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          
          <table class="table border card-table table-vcenter text-nowrap table-primary align-items-center">
            <thead class="bg-primary text-white">
              <tr>
                <th class="text-white">Id Contact</th>
                <th class="text-white">Full Name</th>
                <th class="text-white">Email</th>
                <th class="text-white">Specialist</th>
                <th class="text-white">Phone Number</th>
                <th class="text-white">Message</th>
                <th class="text-white">Archiver</th>


              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let contact of contacts">
                <td>{{ contact.idContactUs }}</td>
                <td>{{ contact.fullName }}</td>
                <td>{{ contact.email }}</td>
                <td>{{ contact.specialist }}</td>
                <td>{{ contact.phoneNumber }}</td>
                <td>{{ contact.message }}</td>
                <td>       
                  <button type="button" class="btn btn-outline-secondary px-3 px-sm-4" *ngIf="contact.idContactUs as id" (click)="archiveContact(id)">
                    <i class="fa fa-archive me-1"></i>
                    <span class="d-none d-sm-inline">Archive</span>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
