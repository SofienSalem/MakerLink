<div class="page-style1 light-mode default-sidebar error-page1">
  <div class="login-img">
      <div class="page">
          <div class="container">
              <div class="row">
                  <div class="col mx-auto">
                      <div class="row justify-content-center mt-4">
                          <div class="col-md-7 col-lg-5">
                              <div class="login-option">

                                <ul
                                ngbNav
                                #nav="ngbNav"
                                class="nav-tabs"
                                class="nav-tabs rounded-2 justify-content-center"
                              >
                                <li ngbNavItem="Firebase" >
                                  <a ngbNavLink class="firebase-img">
                                    <img src="./assets/images/svgs/firebase.svg" alt="" />
                                  </a>
                                  <ng-template ngbNavContent>

                                    <form name = form #f= "ngForm"
                                    (ngSubmit)="f.form.valid && onSubmit ()" novalidate >
                                      <div class="form-group">
                                        <div class="form-group mt-2">
                                          <p class="text-danger">
                                              </p>

                                          <p  class="text-danger">
                                               </p>
                                          </div>
                                      <div class="text-center title-style mb-6">
                                        <h1 class="mb-4">MakerLink Login</h1>

                                      </div>
                                      <div class="input-group mb-3">
                                        <a
                                          href="javascript:void(0)"
                                          class="input-group-text bg-white text-muted"
                                        >
                                          <i
                                            class="zmdi zmdi-email text-muted"
                                            aria-hidden="true"
                                          ></i>
                                        </a>
                                        <input type="email"  name="email" #email="ngModel" id = "email"  [(ngModel)]= "form.email" class="form-control form-control-lg" required>
                                        <div class="invalid-feedback position-absolute start-0 top-100">Please enter a valid email address!</div>

                                      </div>
                                      <div class="input-group mb-4">
                                        <a
                                          href="javascript:void(0)"
                                          class="input-group-text bg-white text-muted"
                                        >
                                          <i
                                            class="zmdi zmdi-eye text-muted"
                                            aria-hidden="true"
                                               
                                          ></i>
                                        </a>
                                        <input type="password"  name="password" id="password" [(ngModel)]="form.password" #password="ngModel" class="form-control form-control-lg" required>

                                      </div>

                            
                                        <button type="submit" class="btn btn-lg btn-primary btn-block ">Sign in</button>

                                        <div class="text-center pt-3">
                                          <p class="text-dark mb-0">
                                            Not a member?<a
                                              routerLink="/auth/register"
                                              class="text-primary ms-1"
                                              >Sign UP</a
                                            >
                                          </p>
                                        </div>
                                        <div class=" flex-c-m text-center mt-3">
                                          <p>Or</p>
                                          <div class="social-icons">
                                            <ul>
                                              <li><a class="btn  btn-social btn-block"><i class="fa fa-google-plus text-google-plus"></i> Sign up with Google</a></li>
                                              <li><a class="btn  btn-social btn-block mt-2"><i class="fa fa-facebook text-facebook"></i> Sign in with Facebook</a></li>
                                            </ul>
                                          </div>
                                        </div>


                                    </div>
                                    </form>
                                  </ng-template>
                                </li>
                                <li ngbNavItem="Angular">
                                  <a ngbNavLink class="firebase-img">
                                    <img src="./favicon.ico" alt="" />
                                  </a>
                                  <ng-template ngbNavContent>
                                    <form >
                                      <div class="text-center title-style mb-6">
                                        <h1 class="mb-4">Login</h1>
                                      </div>
                                      <div class="input-group mb-3">
                                        <a
                                          href="javascript:void(0)"
                                          class="input-group-text bg-white text-muted"
                                        >
                                          <i
                                            class="zmdi zmdi-email text-muted"
                                            aria-hidden="true"
                                          ></i>
                                        </a>
                                        <input
                                          type="text"
                                          class="form-control"
                                          placeholder="Username"
                                          autocomplete
                                          formControlName="username"
                                        />
                                      </div>
                                      <div class="input-group mb-4">
                                        <a
                                          href="javascript:void(0)"
                                          class="input-group-text bg-white text-muted"
                                        >
                                          <i
                                            class="zmdi zmdi-eye text-muted"
                                            aria-hidden="true"
                                                
                                          ></i>
                                        </a>
                                        <input
                                    class="form-control"
                                    placeholder="Password"
                                    autocomplete
                                        />
                                      </div>


                                          <button
                                            type="submit"
                                            class="btn btn-lg btn-primary btn-block"

                                          >
                                            Login
                                          </button>
                                          <div class="text-center pt-3">
                                            <p class="text-dark mb-0">
                                              Not a member?<a class="text-primary ms-1" [routerLink]="['/auth/register']">Sign UP</a>
                                            </p>
                                          </div>
                                          
                                          <div class=" flex-c-m text-center mt-3">
                                            <p>Or</p>
                                            <div class="social-icons">
                                              <ul>
                                                <li><a class="btn  btn-social btn-block"><i class="fa fa-google-plus text-google-plus"></i> Sign up with Google</a></li>
                                                <li><a class="btn  btn-social btn-block mt-2"><i class="fa fa-facebook text-facebook"></i> Sign in with Facebook</a></li>
                                              </ul>
                                            </div>
                                          </div>




                                    </form>
                                  </ng-template>
                                </li>
                              </ul>
                                      </div>
                              <div class="card p-4">
                                  <div class="card-body">
                                      <div [ngbNavOutlet]="nav" class="ml-4"></div>
                                  </div>
                              </div>
                          </div>
                      </div>
                  </div>
              </div>
          </div>
      </div>
  </div>
</div>
